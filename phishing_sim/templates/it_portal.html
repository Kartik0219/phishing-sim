<!DOCTYPE html>
<!-- LAB SIMULATION ONLY - NOT A REAL LOGIN PAGE -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IT Portal - Sign In</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    background: #f5f5f7;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    background: #fff;
    border-radius: 18px;
    padding: 2.75rem 2.25rem 2.25rem;
    width: 340px;
    box-shadow: 0 4px 24px rgba(0,0,0,.10);
  }
  .logo {
    font-size: 1.35rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: #1d1d1f;
    text-align: center;
    margin-bottom: 0.2rem;
  }
  .logo span { font-weight: 400; color: #6e6e73; }
  .subtitle {
    text-align: center;
    font-size: 0.8rem;
    color: #6e6e73;
    margin-bottom: 1.75rem;
  }
  label {
    display: block;
    font-size: 0.78rem;
    font-weight: 500;
    color: #6e6e73;
    margin-bottom: 0.3rem;
    margin-top: 1rem;
    letter-spacing: 0.01em;
  }
  input[type=text], input[type=password] {
    width: 100%;
    padding: 0.6rem 0.85rem;
    font-size: 0.95rem;
    font-family: inherit;
    border: 1.5px solid #d2d2d7;
    border-radius: 10px;
    outline: none;
    transition: border-color 0.15s;
    background: #fff;
    color: #1d1d1f;
  }
  input:focus { border-color: #0071e3; }
  button {
    width: 100%;
    margin-top: 1.5rem;
    padding: 0.7rem;
    background: #0071e3;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 0.95rem;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s;
  }
  button:hover { background: #0077ed; }
  button:active { background: #006edb; }
  .footer { margin-top: 1.1rem; font-size: 0.78rem; color: #6e6e73; text-align: center; }
  a { color: #0071e3; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .demo-banner {
    background: #ff3b30;
    color: #fff;
    font-weight: 600;
    font-size: 0.8rem;
    text-align: center;
    padding: 0.6rem 1rem;
    letter-spacing: -0.01em;
  }
</style>
</head>
<body>
{% if demo %}
<div class="demo-banner">Portfolio demo &mdash; this is a simulated phishing page. Do not enter real credentials.</div>
{% endif %}
<div class="card">
  <div class="logo">IT <span>Portal</span></div>
  <p class="subtitle">Sign in with your corporate account</p>
  <form method="POST" action="/submit/{{ token }}">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username"
           placeholder="you@example.com" required>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password"
           placeholder="Password" required>
    <button type="submit">Sign in</button>
  </form>
  <p class="footer">Forgot your password? <a href="#">Reset it</a></p>
</div>
</body>
</html>
