<!DOCTYPE html>
<!-- LAB SIMULATION ONLY - NOT A REAL LOGIN PAGE -->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>IT Portal - Sign In</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Segoe UI, Roboto, sans-serif; background: #f0f2f5;
         display: flex; flex-direction: column; align-items: center;
         justify-content: center; min-height: 100vh; }
  .card { background: white; border-radius: 8px; padding: 2.5rem 2rem;
          width: 360px; box-shadow: 0 2px 10px rgba(0,0,0,.12); }
  .logo { font-size: 1.4rem; font-weight: 700; color: #0f4c82;
          text-align: center; margin-bottom: 1.5rem; }
  .logo span { font-weight: 300; color: #444; }
  label { display: block; font-size: .85rem; color: #555;
          margin-bottom: .25rem; margin-top: .9rem; }
  input[type=text], input[type=password] {
    width: 100%; padding: .55rem .75rem; font-size: .95rem;
    border: 1px solid #ccc; border-radius: 4px; outline: none; }
  input:focus { border-color: #0f4c82; }
  button { width: 100%; margin-top: 1.25rem; padding: .65rem;
           background: #0f4c82; color: white; border: none;
           border-radius: 4px; font-size: 1rem; cursor: pointer; }
  button:hover { background: #0d3d6e; }
  .footer { margin-top: 1rem; font-size: .78rem; color: #999; text-align: center; }
  a { color: #0f4c82; text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">IT <span>Portal</span></div>
  <form method="POST" action="/submit/{{ token }}">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" autocomplete="username"
           placeholder="you@example.com" required>
    <label for="password">Password</label>
    <input type="password" id="password" name="password" autocomplete="current-password"
           placeholder="Your password" required>
    <button type="submit">Sign in</button>
  </form>
  <p class="footer">Forgot your password? <a href="#">Reset it</a></p>
</div>
</body>
</html>
